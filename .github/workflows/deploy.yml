name: FleetEase CI/CD Pipeline

# TRIGGER: Run this pipeline whenever code is pushed to main branch
on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest      # GitHub gives you a free Linux machine to run this

    steps:
      # Step 1: Download your code onto the GitHub machine
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Step 3: Install backend dependencies and test
      - name: Install & Test Backend
        working-directory: ./fleetease-backend
        run: |
          npm install
          echo "✅ Backend dependencies installed"

      # Step 4: Install frontend dependencies and build
      - name: Install & Build Frontend
        working-directory: ./fleetease-frontend
        run: |
          npm install
          npm run build
          echo "✅ Frontend built successfully"

      # Step 5: Build Docker images (proves they work)
      - name: Build Docker Images
        run: |
          docker-compose build
          echo "✅ Docker images built successfully"